{% extends 'base.html' %}
{% block titulo %}Confirmar Eliminación{% endblock %}
{% block contenido %}

<div class="page-header">
    <h1>🗑️ Confirmar Eliminación</h1>
</div>

<div class="resumen-card" style="border-top-color:#c0392b;">
    <h2 style="color:#c0392b;">⚠️ ¿Estás seguro?</h2>
    <p style="margin:1rem 0; color:#5a6a80;">
        Estás a punto de eliminar permanentemente el registro de:
    </p>
    <p style="font-size:1.2rem; font-weight:700; color:#0d2b5e;">
        {{ objeto }}
    </p>
    <p style="color:#c0392b; font-size:0.88rem;">
        Esta acción no se puede deshacer.
    </p>

    <form method="post" style="margin-top:1.5rem;">
        {% csrf_token %}
        <button type="submit"
            style="background:#c0392b; color:white; border:none;
                   padding:0.7rem 1.5rem; border-radius:8px;
                   font-size:1rem; cursor:pointer; font-family:inherit;">
            🗑️ Sí, eliminar
        </button>
        <a href="javascript:history.back()" class="btn-secundario">← Cancelar</a>
    </form>
</div>

{% endblock %}
